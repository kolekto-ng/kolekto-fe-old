[build]
  command = "npm run build"
  publish = "dist"

# Legacy PWA routes now load the main SPA and redirect client-side.
[[redirects]]
  from = "/pwa"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/pwa/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/pwa.html"
  to = "/index.html"
  status = 200

# Catch-all for main SPA (must be LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
